<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Historical Weather Data</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/weather.css">
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="text-center flex-grow-1">Historical Weather Data for <span th:text="${city}"></span></h1>
        <button id="unitToggle" class="btn btn-outline-light btn-sm" onclick="toggleUnit()">°F</button>
    </div>
    <table class="table table-striped table-dark">
        <thead>
        <tr>
            <th>Date</th>
            <th>Average Temp</th>
            <th>Max Temp</th>
            <th>Min Temp</th>
            <th>Condition</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="data : ${historicalData}">
            <td th:text="${data.date}"></td>
            <td><span class="history-temp" th:attr="data-celsius=${data.averageTemp}" th:text="${data.averageTemp}"></span><span class="temp-unit-label">°C</span></td>
            <td><span class="history-temp" th:attr="data-celsius=${data.maxTemp}" th:text="${data.maxTemp}"></span><span class="temp-unit-label">°C</span></td>
            <td><span class="history-temp" th:attr="data-celsius=${data.minTemp}" th:text="${data.minTemp}"></span><span class="temp-unit-label">°C</span></td>
            <td th:text="${data.dominantCondition}"></td>
        </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back</a>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="/js/weather.js"></script>
</body>
</html>
